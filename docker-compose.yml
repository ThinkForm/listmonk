# All LISTMONK_* env variables also support the LISTMONK_*_FILE pattern for loading secrets from files with Docker secrets and Podman
# eg: LISTMONK_ADMIN_USER -> LISTMONK_ADMIN_USER_FILE=/path/to/file_with_value

x-db-credentials: &db-credentials                             # Use the default POSTGRES_ credentials if they're available or simply default to "listmonk"
  POSTGRES_USER: &db-user listmonk                            # for database user, password, and database name
  POSTGRES_PASSWORD: &db-password listmonk
  POSTGRES_DB: &db-name listmonk

services:
  # listmonk app
  app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: unless-stopped
    ports:
      - "8000:8000"                                           # To change the externally exposed port, change to: $custom_port:8000
    networks:
      - listmonk
    hostname: listmonk.example.com                            # Recommend using FQDN for hostname
    depends_on:
      - db
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
                                                              # --config (file) param is set to empty so that listmonk only uses the env vars (below) for config.
                                                              # --install --idempotent ensures that DB installation happens only once on an empty DB, on the first ever start.
                                                              # --upgrade automatically runs any DB migrations when a new image is pulled.

    environment:                                              # The same params as in config.toml are passed as env vars here.

      LISTMONK_app__address: 0.0.0.0:8000

      LISTMONK_db__user: *db-user
      LISTMONK_db__password: *db-password
      LISTMONK_db__database: *db-name
      LISTMONK_db__host: db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: 300s

      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}           # If these (optional) are set during the first `docker compose up`, then the Super Admin user is automatically created.
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}   # Otherwise, the user can be setup on the web app after the first visit to http://localhost:8000

      LISTMONK__smtp_host: smtppro.zoho.com
      LISTMONK__smtp_port: 587
      LISTMONK_smtp__user: hello@thinkform.studio
      LISTMONK_smtp__password: JwfdYF41Xh1J
      LISTMONK_smtp__auth_protocol: login
      LISTMONK_smtp__tls_enabled: true
      LISTMONK_smtp__hello_hostname: thinkform.studio

      TZ: Europe/Berlin

      LISTMONK_MCP_URL: http://localhost:8000
      LISTMONK_MCP_USERNAME: apiuser
      LISTMONK_MCP_PASSWORD: iEmBdbExiSVuf7Rkhg8WtE5F8ByhzdRbbplRDkLTwM430th7

    volumes:
      - ./uploads:/listmonk/uploads:rw                        # Mount an uploads directory on the host to /listmonk/uploads inside the container.
                                                              # To use this, change directory path in Admin -> Settings -> Media to /listmonk/uploads

  # Postgres database
  db:
    image: postgres:17-alpine
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"                                 # Only bind on the local interface. To connect to Postgres externally, change this to 0.0.0.0
    networks:
      - listmonk
    environment:
      <<: *db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: listmonk-data
        target: /var/lib/postgresql/data

  # One-shot: creates/re-passwords the read-only postgres_exporter role.
  # Runs every deploy (restart: "no", re-run fresh each time) since the role
  # can't be seeded via docker-entrypoint-initdb.d on an already-initialized
  # data volume.
  postgres-exporter-init:
    image: postgres:17-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: *db-user
      PGPASSWORD: *db-password
      PGDATABASE: *db-name
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD}
    volumes:
      - ./postgres-exporter/init.sql:/init.sql:ro
    entrypoint:
      - "sh"
      - "-c"
      - 'psql -v ON_ERROR_STOP=1 -v exporter_password="$${POSTGRES_EXPORTER_PASSWORD}" -f /init.sql'
    networks:
      - listmonk

  # Exposed only on the listmonk network (to reach db) and
  # tf-observability-agent (so this server's own Alloy can scrape it and
  # push the metrics onward to the central Prometheus) — never published
  # to the host. See thinkform-infra/observability-agent for the scrape
  # config, and observability-core for the dashboard.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: listmonk-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres-exporter-init:
        condition: service_completed_successfully
    environment:
      DATA_SOURCE_NAME: "host=db port=5432 user=postgres_exporter password=${POSTGRES_EXPORTER_PASSWORD} dbname=listmonk sslmode=disable"
    networks:
      - listmonk
      - tf-observability-agent

networks:
  listmonk:
  # Pre-existing network owned by thinkform-infra/observability-agent —
  # lets this server's own Alloy scrape postgres-exporter without
  # publishing it, then remote_write the metrics onward to Prometheus.
  tf-observability-agent:
    external: true

volumes:
  listmonk-data:
